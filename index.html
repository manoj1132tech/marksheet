<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR Portal - Admin & Teacher</title>
    <style>
        /* --- PORTAL UI COLORS --- */
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; --bg: #f0f2f5; 
            --purple-banner: #673ab7; --subject-bg: #f1f8ff; --total-bg: #fff9c4;
            --header-fa: #e8f5e9; --header-hy: #e1f5fe; --header-an: #f3e5f5;
        }
        
        body { font-family: 'Times New Roman', serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* --- UI Elements (Non-Printable) --- */
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index:1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); border-color: var(--red); }
        .container { max-width: 950px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        .step-box { margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f8f9fa; }
        label { font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        #studentDetailBox { background: #e3f2fd; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #90caf9; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .detail-item b { color: var(--red); }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; font-size: 16px; cursor: pointer; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-print { background: var(--red); margin-top: 10px; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; font-weight:bold; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MARKSHEET DESIGN (Printable) --- */
        .marksheet-page {
            width: 210mm; height: 297mm; padding: 15mm; margin: 10px auto;
            background: #fffdf5; position: relative; box-sizing: border-box;
            border: 6px double var(--red); outline: 2px solid var(--gold); outline-offset: -12px;
            box-shadow: inset 0 0 0 15px white, inset 0 0 0 17px var(--gold);
            page-break-after: always; color: #000; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .marksheet-page::before {
            content: ""; position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); 
            width: 480px; height: 480px; background-image: url('2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg');
            background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.15; z-index: 0;
        }
        .m-content { position: relative; z-index: 1; }
        .m-school-name { font-size: 34px; font-weight: 900; color: var(--red); margin: 0; text-align: center; text-transform: uppercase; }
        .m-address { font-size: 16px; font-weight: bold; text-align: center; margin: 5px 0; }
        .m-session { font-size: 18px; font-weight: bold; text-align: center; color: #1a2a6c; }
        .m-banner { 
            background: var(--purple-banner) !important; color: white; font-size: 20px; font-weight: bold; 
            padding: 6px; text-align: center; width: 40%; margin: 15px auto; border-radius: 30px; border: 2px solid var(--gold); 
        }
        .m-info-table { width: 100%; margin: 10px 0; font-size: 18px; border-spacing: 0 8px; }
        .m-underline { border-bottom: 1.5px solid #000; font-weight: bold; padding: 0 10px; color: #d32f2f; }
        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; background: rgba(255,255,255,0.6); }
        .m-marks-table th { border: 1px solid #000; padding: 8px 2px; font-size: 13px; text-align: center; background: #f5f5f5; }
        .m-marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; font-size: 15px; }
        .subject-cell { text-align: left !important; padding-left: 12px !important; background: var(--subject-bg) !important; color: #0d47a1; }
        .m-result-box { margin-top: 20px; font-weight: bold; font-size: 18px; border: 2px solid var(--red); padding: 12px; display: flex; justify-content: space-between; background: #fff9e6 !important; }
        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 20px; }
        .m-sig-box { border-top: 2px solid #000; width: 170px; text-align: center; font-weight: bold; padding-top: 5px; }
        .floral { text-align: center; color: var(--gold); font-size: 24px; margin-top: 10px; }

        @media print { .no-print { display: none; } .marksheet-page { margin: 0; border: 6px double var(--red) !important; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="margin-top:10px;">Syncing with KRR Database...</div>
</div>

<div class="nav-bar no-print">
    <h2 style="margin:0 0 10px 0;">K.R.R. INTER COLLEGE PORTAL</h2>
    <button class="nav-btn active" onclick="showTab('teacher')">TEACHER PORTAL</button>
    <button class="nav-btn" onclick="showTab('admin')">ADMIN PANEL</button>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <h3>Teacher Entry Mode</h3>
        <div class="step-box">
            <label>1. Select Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Choose Class --</option>
                <option value="I">Class I</option><option value="II">Class II</option>
                <option value="III">Class III</option><option value="IV">Class IV</option>
                <option value="V">Class V</option><option value="VI">Class VI</option>
                <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div class="step-box" id="studentStep" style="display:none;">
            <label>2. Select Student</label>
            <select id="tStudent" onchange="showDetails()"></select>
        </div>
        <div id="studentDetailBox" style="display:none;">
            <div class="detail-item">Student: <b id="detName"></b></div>
            <div class="detail-item">Father: <b id="detFather"></b></div>
            <div class="detail-item">Mother: <b id="detMother"></b></div>
            <div class="detail-item">PEN No: <b id="detPen"></b></div>
        </div>
        <div class="step-box" id="subjectStep" style="display:none;">
            <label>3. Select Subject</label>
            <select id="tSubject" onchange="loadMarks()">
                <option value="">-- Choose Subject --</option>
                <option value="english">ENGLISH</option><option value="hindi">HINDI</option>
                <option value="math">MATHEMATICS</option><option value="science">SCIENCE</option>
                <option value="social">SOCIAL SCIENCE</option><option value="computer">COMPUTER/GK</option>
                <option value="drawing">DRAWING</option>
            </select>
        </div>
        <div id="marksArea" style="display:none; background:#fff; padding:15px; border:1px solid #ddd; border-radius:8px;">
            <h4 id="curSubTitle" style="color:var(--red); margin:0 0 10px 0;"></h4>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>FA 1+2: <input type="number" id="m1"></div>
                <div>Half Yearly: <input type="number" id="m2"></div>
                <div>FA 3+4: <input type="number" id="m3"></div>
                <div>Annual: <input type="number" id="m4"></div>
            </div>
            <button class="btn-action" onclick="saveData()">SAVE MARKS</button>
        </div>
    </div>

    <div id="admin" class="section">
        <h3>Admin Management</h3>
        <div class="step-box">
            <label>Upload PC Data (CSV):</label>
            <input type="file" id="csvFile" accept=".csv">
            <button class="btn-action" style="background:var(--blue);" onclick="uploadCSV()">Upload & Sync</button>
        </div>
        <div class="step-box">
            <label>Bulk Print Marksheets:</label>
            <select id="printClass">
                <option value="">-- Select Class --</option>
                <option value="VIII">Class VIII</option><option value="VII">Class VII</option>
                <option value="VI">Class VI</option><option value="V">Class V</option>
            </select>
            <button class="btn-action btn-print" onclick="generatePrint()">Download PDF / Print All</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    let MASTER = [];

    async function sync() {
        document.getElementById('loader').style.display='flex';
        const res = await fetch(API + "?t=" + Date.now());
        MASTER = await res.json();
        document.getElementById('loader').style.display='none';
    }
    sync();

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function filterStudents() {
        const cls = document.getElementById('tClass').value.toUpperCase();
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Choose Student --</option>';
        MASTER.forEach((r, i) => {
            if(i>0 && r[3] && r[3].toString().trim().toUpperCase() === cls) {
                sel.add(new Option(r[0], i));
            }
        });
        document.getElementById('studentStep').style.display='block';
    }

    function showDetails() {
        const i = document.getElementById('tStudent').value;
        if(!i) return;
        document.getElementById('detName').innerText = MASTER[i][0];
        document.getElementById('detFather').innerText = MASTER[i][2];
        document.getElementById('detMother').innerText = MASTER[i][1];
        document.getElementById('detPen').innerText = MASTER[i][6] || "N/A";
        document.getElementById('studentDetailBox').style.display='grid';
        document.getElementById('subjectStep').style.display='block';
    }

    const colMap = { english:[7,8,9,10], hindi:[11,12,13,14], math:[15,16,17,18], science:[19,20,21,22], social:[23,24,25,26], computer:[27,28,29,30], drawing:[31,32,33,34] };

    function calculateGrade(marks) {
        if (marks >= 160) return 'A+';
        if (marks >= 120) return 'A';
        if (marks >= 90) return 'B';
        if (marks >= 66) return 'C';
        return 'D';
    }

    function getNextClass(curr) {
        const classes = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII"];
        let idx = classes.indexOf(curr.trim().toUpperCase());
        return (idx !== -1 && idx < classes.length - 1) ? classes[idx + 1] : "IX";
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value.toUpperCase();
        if(!cls) return alert("Select Class!");
        let printHTML = '';

        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] && r[3].toString().trim().toUpperCase() === cls) {
                let rowsHtml = '';
                let grandTotal = 0;

                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    grandTotal += t;
                    rowsHtml += `<tr>
                        <td class="subject-cell">${s.toUpperCase()}</td>
                        <td>${r[c[0]] || '00'}</td><td>${r[c[1]] || '00'}</td>
                        <td>${r[c[2]] || '00'}</td><td>${r[c[3]] || '00'}</td>
                        <td style="background:var(--total-bg) !important;">${t}</td>
                        <td style="color:blue;">${calculateGrade(t)}</td>
                    </tr>`;
                });

                // Physical Education Row (Grade Based)
                rowsHtml += `<tr>
                    <td class="subject-cell">PHY. HEALTH EDU.</td>
                    <td>-</td><td>${r[35]||'A+'}</td><td>-</td><td>${r[36]||'A+'}</td>
                    <td style="background:var(--total-bg) !important;">-</td><td style="color:blue;">A+</td>
                </tr>`;

                printHTML += `
                <div class="marksheet-page">
                    <div class="m-content">
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" style="width:80px; border-radius:50%;">
                            <div style="flex:1;">
                                <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                                <p class="m-address">MANPUR BAHERI ( BAREILLY ) 243201</p>
                                <p class="m-session">SESSION : 2025 - 2026</p>
                            </div>
                            <div style="width:80px;"></div>
                        </div>

                        <div class="m-banner">PROGRESS REPORT</div>

                        <table class="m-info-table">
                            <tr><td colspan="2">Student Name :- <span class="m-underline">${r[0]}</span></td></tr>
                            <tr>
                                <td>Mother’s Name :- <span class="m-underline">Mrs. ${r[1]}</span></td>
                                <td>Roll No :- <span class="m-underline">${r[4]}</span></td>
                            </tr>
                            <tr>
                                <td>Father’s Name :- <span class="m-underline">Mr. ${r[2]}</span></td>
                                <td>Class :- <span class="m-underline">${r[3]}</span></td>
                            </tr>
                            <tr>
                                <td>Date of Birth :- <span class="m-underline">${r[5]}</span></td>
                                <td>PEN NO. :- <span class="m-underline">${r[6]||"---"}</span></td>
                            </tr>
                        </table>

                        <table class="m-marks-table">
                            <thead>
                                <tr>
                                    <th rowspan="2" style="width:180px;">Subjects</th>
                                    <th style="background:var(--header-fa)!important">FA (I+II)</th>
                                    <th style="background:var(--header-hy)!important">Half Yearly</th>
                                    <th style="background:var(--header-fa)!important">FA (III+IV)</th>
                                    <th style="background:var(--header-an)!important">Annual Exam</th>
                                    <th style="background:var(--total-bg)!important">Total</th>
                                    <th style="background:#2196F3!important; color:white;">Grade</th>
                                </tr>
                                <tr>
                                    <th>30</th><th>70</th><th>30</th><th>70</th><th>200</th><th>-</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>

                        <div class="m-result-box">
                            <span>Final Result: PASS</span>
                            <span>Grand Total: ${grandTotal} / 1400</span>
                            <span>Percentage: ${(grandTotal/14).toFixed(2)}%</span>
                        </div>

                        <div style="margin-top:15px; font-size:18px; color:green; font-weight:bold;">
                            Teacher's Remarks: Excellent Performance! <br>
                            <span style="color:#000;">Result Status: Promoted to Class </span> 
                            <span style="color:var(--red); text-decoration:underline;">${getNextClass(r[3])}</span>
                        </div>
                    </div>

                    <div class="m-sig-row">
                        <div class="m-sig-box">Guardian sign</div>
                        <div class="m-sig-box">Class Teacher’s Sign</div>
                        <div class="m-sig-box">Principal Sign</div>
                    </div>
                    <div class="floral">❦ ❀ ❦</div>
                </div>`;
            }
        });

        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${printHTML}</body></html>`);
        win.document.close();
        setTimeout(() => win.print(), 500);
    }

    // Existing Helper Functions
    async function saveData() { /* logic same as original */ }
    function uploadCSV() { /* logic same as original */ }
</script>
</body>
</html>
