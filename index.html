<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR School Portal - Pro Colorful Design</title>
    <style>
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; 
            --purple: #673ab7; --total-bg: #fff9c4;
            /* Subject Row Colors */
            --sub-hindi: #fff0f5; --sub-english: #f1f8ff; --sub-math: #f0fff4; 
            --sub-sci: #fffdf0; --sub-social: #fdf5ff; --sub-comp: #f0f3ff; 
            --sub-drawing: #fff3f0; --sub-phy: #e8f5e9;
        }
        
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; }
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index:1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        .step-box { margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f8f9fa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }

        /* --- MARKSHEET DESIGN --- */
        .marksheet-page {
            width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto;
            background: #fffdf5 !important; position: relative; box-sizing: border-box;
            border: 8px double var(--red) !important;
            outline: 2px solid var(--gold) !important; outline-offset: -12px;
            page-break-after: always; display: flex; flex-direction: column;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }

        /* Watermark (Small, Seedha, Center-Aligned behind Marks Table) */
        .watermark-small {
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; /* Small size */ opacity: 0.15; z-index: 1; pointer-events: none;
        }

        .m-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; position: relative; z-index: 2;}
        .m-school-name { font-size: 38px; font-weight: 900; color: var(--red) !important; margin: 0; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .m-banner { 
            background: var(--purple) !important; color: white !important; font-size: 24px; font-weight: bold;
            padding: 10px 60px; text-align: center; width: fit-content; margin: 15px auto; 
            border-radius: 50px; border: 2px solid var(--gold); text-transform: uppercase;
        }

        .m-info-table { width: 100%; margin: 15px 0; font-size: 19px; border-collapse: collapse; position: relative; z-index: 2;}
        .m-info-table td { padding: 6px 0; }
        .m-name { color: var(--red) !important; font-weight: 900; font-size: 22px; }
        .m-mother { color: var(--blue) !important; font-weight: bold; }
        .m-father { color: #333; font-weight: bold; }
        .m-pen { color: #1b5e20 !important; font-weight: bold; }

        /* Marks Table Design */
        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; position: relative; z-index: 2;}
        .m-marks-table th { background: #333 !important; color: white !important; padding: 10px 2px; font-size: 13px; border: 1px solid #000; }
        .m-marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; font-size: 15px; background: #fff !important; }

        /* Subject Column - Fixed, Colored, No internal border */
        .sub-name-cell { 
            text-align: left !important; padding-left: 12px !important; 
            color: #fff !important; font-weight: bold; font-size: 14px;
            width: 180px; border: 1px solid #000 !important;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        
        .total-cell { background: var(--total-bg) !important; color: #000 !important; border: 1.5px solid #000 !important; }
        .grade-cell { color: var(--red) !important; font-weight: 900 !important; }

        .m-result-box { 
            margin-top: 20px; border: 2.5px solid var(--red); padding: 15px; 
            display: flex; justify-content: space-between; 
            background: #fff9e6 !important; border-radius: 40px; 
            font-size: 20px; font-weight: bold; position: relative; z-index: 2;
        }

        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 10px; position: relative; z-index: 2;}
        .m-sig-box { border-top: 2px solid #000; width: 170px; text-align: center; font-weight: bold; padding-top: 5px; }
        
        /* Colourful Floral Design */
        .floral-line { text-align: center; font-size: 28px; margin-top: 10px; letter-spacing: 8px; position: relative; z-index: 2;}
        .f-gold { color: var(--gold); } .f-red { color: var(--red); }

        @media print { .no-print { display: none; } body { background: white; margin: 0; } .marksheet-page { margin: 0; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2>K.R.R. JUNIOR HIGH SCHOOL PORTAL</h2>
    <button class="nav-btn active" onclick="showTab('teacher')">TEACHER ENTRY</button>
    <button class="nav-btn" onclick="showTab('admin')">ADMIN PANEL</button>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <div class="step-box">
            <label>1. Select Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Choose --</option>
                <option value="I">Class I</option><option value="II">Class II</option>
                <option value="III">Class III</option><option value="IV">Class IV</option>
                <option value="V">Class V</option><option value="VI">Class VI</option>
                <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div id="studentStep" class="step-box" style="display:none;"><label>2. Select Student</label><select id="tStudent" onchange="document.getElementById('subjectStep').style.display='block';"></select></div>
        <div id="subjectStep" class="step-box" style="display:none;">
            <label>3. Select Subject</label>
            <select id="tSubject" onchange="loadMarks()">
                <option value="">-- Choose Subject --</option>
                <option value="hindi">HINDI</option><option value="english">ENGLISH</option><option value="math">MATHEMATICS</option>
                <option value="science">SCIENCE</option><option value="social">SOCIAL SCIENCE</option><option value="computer">COMPUTER/GK</option>
                <option value="drawing">DRAWING</option><option value="physical">PHY. HEALTH EDU.</option>
            </select>
        </div>
        <div id="marksArea" style="display:none;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; background:#fff; padding:15px; border-radius:8px; border:1px solid #ddd;">
                <div>FA I+II: <input type="number" id="m1"></div><div>Half Yearly: <input type="number" id="m2"></div>
                <div>FA III+IV: <input type="number" id="m3"></div><div>Annual: <input type="number" id="m4"></div>
            </div>
            <button class="btn-action" onclick="saveData()">Update Marks</button>
        </div>
    </div>

    <div id="admin" class="section">
        <h3>Admin Management</h3>
        <div class="step-box"><label>Bulk Print Marksheets</label><select id="printClass"><option value="I">Class I</option><option value="VIII">Class VIII</option></select><button class="btn-action btn-print" onclick="generatePrint()">Generate Marksheets</button></div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    const ADMIN_PASS = "KRR@2026";
    let MASTER = [];

    async function sync() { const res = await fetch(API); MASTER = await res.json(); }
    sync();

    function showTab(id) {
        if (id === 'admin') { if (prompt("Password:") !== ADMIN_PASS) return; }
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    const colMap = { 
        hindi:[11,12,13,14], english:[7,8,9,10], math:[15,16,17,18], science:[19,20,21,22], 
        social:[23,24,25,26], computer:[27,28,29,30], drawing:[31,32,33,34], physical:[35,36,37,38] 
    };

    function filterStudents() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Select --</option>';
        MASTER.forEach((r, i) => { if(i>0 && r[3] && r[3].toString().trim() == cls) sel.add(new Option(r[0], i)); });
        document.getElementById('studentStep').style.display='block';
    }

    function loadMarks() {
        const sub = document.getElementById('tSubject').value; const i = document.getElementById('tStudent').value;
        const cols = colMap[sub];
        document.getElementById('m1').value = MASTER[i][cols[0]] || 0;
        document.getElementById('m2').value = MASTER[i][cols[1]] || 0;
        document.getElementById('m3').value = MASTER[i][cols[2]] || 0;
        document.getElementById('m4').value = MASTER[i][cols[3]] || 0;
        document.getElementById('marksArea').style.display='block';
    }

    async function saveData() {
        const i = document.getElementById('tStudent').value; const sub = document.getElementById('tSubject').value;
        const vals = [document.getElementById('m1').value, document.getElementById('m2').value, document.getElementById('m3').value, document.getElementById('m4').value];
        await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMarks", rowIndex: parseInt(i), colIndexes: colMap[sub], newValues: vals}) });
        alert("Updated!"); sync();
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value;
        let html = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] && r[3].toString().trim() == cls) {
                let rows = '', gt = 0;
                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    let sName = s === 'social' ? 'SOCIAL SCIENCE' : s === 'physical' ? 'PHY. HEALTH EDU.' : s.toUpperCase();
                    let sColor = s === 'hindi' ? 'var(--sub-hindi)' : s === 'english' ? 'var(--sub-english)' : s === 'math' ? 'var(--sub-math)' : s === 'science' ? 'var(--sub-sci)' : s === 'drawing' ? 'var(--sub-drawing)' : s === 'computer' ? 'var(--sub-comp)' : 'var(--sub-social)';
                    
                    if(s !== 'physical') gt += t;
                    let gr = s==='physical'?'A':(t>=180?'A+':t>=150?'A':t>=120?'B':t>=90?'C':t>=66?'D':'E');

                    rows += `<tr>
                        <td class="sub-name-cell" style="background-color:${sColor} !important; border:none !important; color:#000 !important; font-weight:bold;">${sName}</td>
                        <td>${r[c[0]]||0}</td><td>${r[c[1]]||0}</td><td>${r[c[2]]||0}</td><td>${r[c[3]]||0}</td>
                        <td class="total-cell">${s==='physical'?'-':t}</td>
                        <td class="grade-cell">${gr}</td>
                    </tr>`;
                });

                const perc = (gt / 14).toFixed(2);
                let remarks = perc >= 80 ? "Excellent" : perc >= 60 ? "Very Good" : perc >= 33 ? "Good" : "Needs Work";

                html += `
                <div class="marksheet-page">
                    <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" class="watermark-small">
                    
                    <div class="m-header">
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" style="width:85px; border-radius:50%;">
                            <div style="flex:1;">
                                <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                                <p style="margin:5px; font-weight:bold;">MANPUR BAHERI, BAREILLY (U.P.) 243201</p>
                                <p style="color:var(--blue); font-weight:bold; margin:0;">SESSION : 2025 - 2026</p>
                            </div>
                            <div style="width:85px;"></div>
                        </div>
                    </div>
                    <div class="m-banner">PROGRESS REPORT</div>
                    <table class="m-info-table">
                        <tr><td colspan="2">Student Name : <span class="m-name">${r[0]}</span></td></tr>
                        <tr><td width="65%">Mother Name : <span class="m-mother">Mrs. ${r[1]}</span></td><td>Roll No : <span class="m-pen">${r[4]}</span></td></tr>
                        <tr><td>Father Name : <span class="m-father">Mr. ${r[2]}</span></td><td>Class : <span class="m-pen">${r[3]}</span></td></tr>
                        <tr><td>Date of Birth : <span class="m-father">${r[5]?r[5].toString().split('T')[0]:'---'}</span></td><td>PEN No : <span class="m-pen">${r[6]||"---"}</span></td></tr>
                    </table>
                    <table class="m-marks-table">
                        <thead>
                            <tr><th rowspan="2">SUBJECTS</th><th>FA I+II</th><th>HALF YEARLY</th><th>FA III+IV</th><th>ANNUAL</th><th class="total-cell">TOTAL</th><th>GRADE</th></tr>
                            <tr><th>30</th><th>70</th><th>30</th><th>70</th><th>200</th><th>-</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="m-result-box">
                        <span style="color:${perc>=33?'green':'red'}">Result: ${perc>=33?'PASS':'FAIL'}</span>
                        <span>Total: ${gt}/1400</span>
                        <span>Percentage: ${perc}%</span>
                    </div>
                    <div style="margin-top:20px; font-size:18px; font-weight:bold; position:relative; z-index:2;">
                        <span style="color:green">Remarks: ${remarks}</span><br><br>
                        <span>Promotion Status: <span style="text-decoration:underline;">${perc>=33?'Promoted to next class':'Detained in same class'}</span></span>
                    </div>
                    <div class="m-sig-row">
                        <div class="m-sig-box">Guardian sign</div><div class="m-sig-box">Class Teacher’s Sign</div><div class="m-sig-box">Principal sign</div>
                    </div>
                    <div class="floral-line">
                        <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span>
                    </div>
                </div>`;
            }
        });
        const win = window.open('', '_blank');
        win.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        win.document.close();
        setTimeout(() => win.print(), 1000);
    }
</script>
</body>
</html>
