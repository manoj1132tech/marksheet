<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR School - A4 Colorful Marksheet</title>
    <style>
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; --purple: #673ab7; --green: #2e7d32;
            --sub-hindi: #fff0f5; --sub-english: #f1f8ff; --sub-math: #f0fff4; 
            --sub-sci: #fffdf0; --sub-social: #fdf5ff; --sub-comp: #f0f3ff; 
            --sub-drawing: #fff3f0; --sub-phy: #e8f5e9;
        }
        
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 0; }
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; border-bottom: 3px solid var(--gold); }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; }
        .section { display: none; } .section.active { display: block; }
        .step-box { margin-bottom: 15px; padding: 15px; border-left: 5px solid var(--blue); background: #f9f9f9; border-radius: 5px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }

        /* --- MARKSHEET STYLING (A4 FIXED) --- */
        .marksheet-page {
            width: 210mm; height: 296mm; /* A4 height se thoda kam taaki safe rahe */
            padding: 10mm 12mm; margin: 0 auto;
            background: #fffdfa !important; position: relative; box-sizing: border-box;
            border: 10px double var(--red) !important;
            outline: 3px solid var(--gold) !important; outline-offset: -15px;
            display: flex; flex-direction: column; overflow: hidden;
            page-break-after: always; -webkit-print-color-adjust: exact !important;
        }

        .m-watermark {
            position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; opacity: 0.70; z-index: 1; pointer-events: none;
        }

        .m-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 5px; position: relative; z-index: 2; }
        .m-school-name { font-size: 38px; font-weight: 900; color: var(--red) !important; margin: 0; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .m-banner { 
            background: var(--purple) !important; color: white !important; font-size: 24px; font-weight: bold;
            padding: 8px 60px; text-align: center; width: fit-content; margin: 15px auto; 
            border-radius: 50px; border: 2px solid var(--gold); position: relative; z-index: 2;
        }

        .m-info-table { width: 100%; margin: 10px 0; font-size: 20px; position: relative; z-index: 2; border-collapse: collapse; }
        .m-label { color: #333; font-weight: bold; }
        .m-val { color: var(--blue) !important; font-weight: 900; border-bottom: 1px solid #ccc; padding: 0 5px; }
        .m-name { color: var(--red) !important; font-size: 24px; text-decoration: underline; }

        .m-marks-table { width: 100%; border-collapse: collapse; border: 2.5px solid #000; position: relative; z-index: 2; background: rgba(255,255,255,0.4); }
        .m-marks-table th { background: #222 !important; color: white !important; padding: 8px; border: 1px solid #000; font-size: 14px; }
        .m-marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; font-size: 16px; }

        .sub-col { text-align: left !important; padding-left: 10px !important; color: var(--blue) !important; }
        .total-col { background: #fff176 !important; border: 2px solid #000 !important; }
        .grade-col { color: var(--red) !important; font-size: 18px; }

        .m-result-box { 
            margin-top: 15px; border: 3px solid var(--red); padding: 12px; 
            display: flex; justify-content: space-between; 
            background: #fff9c4 !important; border-radius: 40px; 
            font-size: 20px; font-weight: bold; position: relative; z-index: 2;
        }

        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 10px; position: relative; z-index: 2; }
        .m-sig-box { border-top: 2px solid #000; width: 160px; text-align: center; font-weight: bold; padding-top: 5px; }
        
        .floral-line { text-align: center; font-size: 30px; margin-top: 10px; letter-spacing: 15px; position: relative; z-index: 2; }
        .f-gold { color: var(--gold); } .f-red { color: var(--red); }

        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2 style="margin:0;">K.R.R. JUNIOR HIGH SCHOOL PORTAL</h2>
    <div style="margin-top:10px;">
        <button class="nav-btn active" onclick="showTab('teacher')">TEACHER ENTRY</button>
        <button class="nav-btn" onclick="showTab('admin')">ADMIN (PRINT)</button>
    </div>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <div class="step-box">
            <label>1. Select Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Select --</option>
                <option value="I">Class I</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div id="studentStep" class="step-box" style="display:none;"><label>2. Select Student</label><select id="tStudent"></select></div>
        <button class="nav-btn" style="background:var(--green); width:100%;" onclick="alert('Data saved!')">Update Marks</button>
    </div>

    <div id="admin" class="section">
        <div class="step-box">
            <label>Select Class to Print</label>
            <select id="printClass"><option value="VIII">Class VIII</option></select>
            <button class="nav-btn" style="background:var(--red); width:100%; margin-top:10px;" onclick="generatePrint()">Generate Colorful Marksheets</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    let MASTER = [];
    async function sync() { const res = await fetch(API); MASTER = await res.json(); }
    sync();

    function showTab(id) {
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function filterStudents() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '';
        MASTER.forEach((r, i) => { if(i>0 && r[3] == cls) sel.add(new Option(r[0], i)); });
        document.getElementById('studentStep').style.display='block';
    }

    function formatDOB(dateStr) {
        if(!dateStr) return "---";
        const d = new Date(dateStr);
        return isNaN(d) ? dateStr.split('T')[0] : `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }

    const colMap = { hindi:[11,12,13,14], english:[7,8,9,10], math:[15,16,17,18], science:[19,20,21,22], social:[23,24,25,26], computer:[27,28,29,30], drawing:[31,32,33,34], physical:[35,36,37,38] };

    function generatePrint() {
        const cls = document.getElementById('printClass').value;
        let html = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] == cls) {
                let rows = '', gt = 0;
                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    let sColor = s==='hindi'?'var(--sub-hindi)':s==='math'?'var(--sub-math)':s==='science'?'var(--sub-sci)':'#fff';
                    if(s !== 'physical') gt += t;
                    let gr = t>=180?'A+':t>=150?'A':t>=120?'B':t>=90?'C':'D';

                    rows += `<tr style="background-color:${sColor} !important;">
                        <td class="sub-col">${s.toUpperCase()}</td>
                        <td>${r[c[0]]||0}</td><td>${r[c[1]]||0}</td><td>${r[c[2]]||0}</td><td>${r[c[3]]||0}</td>
                        <td class="total-col">${t}</td><td class="grade-col">${gr}</td>
                    </tr>`;
                });

                const perc = (gt / 14).toFixed(2);
                let rem = perc >= 75 ? "Excellent" : perc >= 60 ? "Very Good" : "Good";

                html += `
                <div class="marksheet-page">
                    <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" class="m-watermark">
                    <div class="m-header">
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" style="width:80px; border-radius:50%;">
                            <div style="flex:1;">
                                <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                                <p style="font-weight:bold; margin:2px;">MANPUR BAHERI, BAREILLY (U.P.) 243201</p>
                                <p style="color:var(--blue); font-weight:bold; margin:0;">SESSION : 2025 - 2026</p>
                            </div>
                            <div style="width:80px;"></div>
                        </div>
                    </div>
                    <div class="m-banner">PROGRESS REPORT</div>
                    <table class="m-info-table">
                        <tr><td colspan="2"><span class="m-label">Name:</span> <span class="m-name">${r[0]}</span></td></tr>
                        <tr><td><span class="m-label">Mother:</span> <span class="m-val">Mrs. ${r[1]}</span></td><td><span class="m-label">Roll No:</span> <span class="m-val">${r[4]}</span></td></tr>
                        <tr><td><span class="m-label">Father:</span> <span class="m-val">Mr. ${r[2]}</span></td><td><span class="m-label">Class:</span> <span class="m-val">${r[3]}</span></td></tr>
                        <tr><td><span class="m-label">DOB:</span> <span class="m-val">${formatDOB(r[5])}</span></td><td><span class="m-label">PEN:</span> <span class="m-val">${r[6]||"---"}</span></td></tr>
                    </table>
                    <table class="m-marks-table">
                        <thead>
                            <tr><th>SUBJECTS</th><th>FA1+2</th><th>HALF Y</th><th>FA3+4</th><th>ANNUAL</th><th class="total-col">TOTAL</th><th>GRADE</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="m-result-box">
                        <span style="color:green">Result: PASS</span>
                        <span>Total: ${gt}/1400</span>
                        <span>Percentage: ${perc}%</span>
                    </div>
                    <div style="margin-top:15px; font-weight:bold; z-index:2; position:relative;">
                        <span style="color:var(--blue)">Teacher Remarks:</span> <span style="color:green">${rem}</span><br>
                        <span>Promotion: <span style="color:var(--red); text-decoration:underline;">Promoted to next class</span></span>
                    </div>
                    <div class="m-sig-row">
                        <div class="m-sig-box">Guardian</div><div class="m-sig-box">Class Teacher</div><div class="m-sig-box">Principal</div>
                    </div>
                    <div class="floral-line">
                        <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span>
                    </div>
                </div>`;
            }
        });
        const w = window.open();
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        w.document.close();
    }
</script>
</body>
</html>
