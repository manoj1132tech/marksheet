<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR Portal - Secure Admin & Teacher</title>
    <style>
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; --bg: #f0f2f5; 
            --purple-banner: #673ab7; --subject-bg: #f1f8ff; --total-bg: #fff9c4;
        }
        
        body { font-family: 'Times New Roman', serif; background: var(--bg); margin: 0; padding: 0; }
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index:1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; cursor: pointer; margin: 5px; border-radius: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); border-color: var(--red); }
        
        .container { max-width: 950px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        
        .step-box { margin-bottom: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f8f9fa; }
        label { font-weight: bold; color: var(--blue); display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        #studentDetailBox { background: #e3f2fd; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #90caf9; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; font-size: 16px; cursor: pointer; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 15px; }
        .btn-print { background: var(--red); margin-top: 10px; }

        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column; font-weight:bold; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MARKSHEET DESIGN (FOR PRINTING) --- */
        .marksheet-page {
            width: 210mm; height: 292mm; padding: 15mm; margin: 0 auto;
            background: #fffdf5 !important; position: relative; box-sizing: border-box;
            border: 6px double #d32f2f !important; outline: 2px solid #b8860b !important; outline-offset: -12px;
            page-break-after: always; -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        .m-banner { 
            background: #673ab7 !important; color: white !important; font-size: 20px; font-weight: bold; 
            padding: 8px 30px; text-align: center; width: fit-content; margin: 15px auto; border-radius: 50px; border: 2px solid #b8860b;
        }
        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin: 10px 0; }
        .m-marks-table th, .m-marks-table td { border: 1px solid #000; padding: 7px; text-align: center; font-size: 15px; }
        .subject-cell { text-align: left !important; padding-left: 12px !important; background: #f1f8ff !important; font-weight: bold; }
        
        .m-result-box { 
            margin-top: 20px; font-weight: bold; font-size: 17px; border: 2px solid #d32f2f; 
            padding: 12px; display: flex; justify-content: space-between; 
            background: #fff9c4 !important; border-radius: 8px;
        }

        @media print { .no-print { display: none; } .marksheet-page { border: 6px double #d32f2f !important; } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Processing Cloud Data...</p></div>

<div class="nav-bar no-print">
    <h2 style="margin:0;">K.R.R. INTER COLLEGE PORTAL</h2>
    <div style="margin-top:10px;">
        <button id="btnTeacher" class="nav-btn active" onclick="showTab('teacher')">TEACHER PORTAL</button>
        <button id="btnAdmin" class="nav-btn" onclick="showTab('admin')">ADMIN PANEL</button>
    </div>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <h3>Marks Entry Mode</h3>
        <div class="step-box">
            <label>Select Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Choose Class --</option>
                <option value="I">Class I</option><option value="II">Class II</option>
                <option value="III">Class III</option><option value="IV">Class IV</option>
                <option value="V">Class V</option><option value="VI">Class VI</option>
                <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div class="step-box" id="studentStep" style="display:none;">
            <label>Select Student</label>
            <select id="tStudent" onchange="showDetails()"></select>
        </div>
        <div id="studentDetailBox" style="display:none;">
            <div>Student: <b id="detName"></b></div>
            <div>Father: <b id="detFather"></b></div>
            <div>Mother: <b id="detMother"></b></div>
            <div>PEN: <b id="detPen"></b></div>
        </div>
        <div class="step-box" id="subjectStep" style="display:none;">
            <label>Select Subject</label>
            <select id="tSubject" onchange="loadMarks()">
                <option value="">-- Choose Subject --</option>
                <option value="english">ENGLISH</option><option value="hindi">HINDI</option>
                <option value="math">MATHEMATICS</option><option value="science">SCIENCE</option>
                <option value="social">SOCIAL SCIENCE</option><option value="computer">COMPUTER/GK</option>
                <option value="drawing">DRAWING</option>
            </select>
        </div>
        <div id="marksArea" style="display:none; padding:15px; border:1px solid #ddd; border-radius:8px;">
            <h4 id="curSubTitle" style="color:var(--red); margin:0 0 10px 0;"></h4>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>FA 1+2 (30): <input type="number" id="m1"></div>
                <div>Half Yearly (70): <input type="number" id="m2"></div>
                <div>FA 3+4 (30): <input type="number" id="m3"></div>
                <div>Annual (70): <input type="number" id="m4"></div>
            </div>
            <button class="btn-action" onclick="saveData()">SAVE MARKS</button>
        </div>
    </div>

    <div id="admin" class="section">
        <h3 style="color: var(--red);">Admin Controls</h3>
        <div class="step-box">
            <label>Upload PC Master Data (CSV):</label>
            <input type="file" id="csvFile" accept=".csv">
            <button class="btn-action" style="background:var(--blue);" onclick="uploadCSV()">Sync Master Data</button>
        </div>
        <div class="step-box" style="border-left-color: var(--gold);">
            <label>Bulk Marksheet Printing:</label>
            <select id="printClass">
                <option value="">-- Select Class --</option>
                <option value="I">Class I</option><option value="II">Class II</option>
                <option value="III">Class III</option><option value="IV">Class IV</option>
                <option value="V">Class V</option><option value="VI">Class VI</option>
                <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
            <button class="btn-action btn-print" onclick="generatePrint()">Generate All Marksheets</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    const ADMIN_PASS = "KRR@2026";
    let MASTER = [];

    async function sync() {
        document.getElementById('loader').style.display='flex';
        try {
            const res = await fetch(API + "?t=" + Date.now());
            MASTER = await res.json();
        } catch(e) { console.log(e); }
        document.getElementById('loader').style.display='none';
    }
    sync();

    function showTab(id) {
        if (id === 'admin') {
            let p = prompt("Enter Security Password:");
            if (p !== ADMIN_PASS) { alert("Access Denied!"); return; }
        }
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById(id === 'teacher' ? 'btnTeacher' : 'btnAdmin').classList.add('active');
    }

    function formatDate(dStr) {
        if (!dStr) return "---";
        let d = dStr.toString().split('T')[0];
        let p = d.split('-');
        return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : dStr;
    }

    function filterStudents() {
        const cls = document.getElementById('tClass').value.toUpperCase();
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Choose Student --</option>';
        MASTER.forEach((r, i) => {
            if(i>0 && r[3] && r[3].toString().trim().toUpperCase() === cls) {
                sel.add(new Option(r[0], i));
            }
        });
        document.getElementById('studentStep').style.display='block';
    }

    function showDetails() {
        const i = document.getElementById('tStudent').value;
        if(!i) return;
        document.getElementById('detName').innerText = MASTER[i][0];
        document.getElementById('detFather').innerText = MASTER[i][2];
        document.getElementById('detMother').innerText = MASTER[i][1];
        document.getElementById('detPen').innerText = MASTER[i][6] || "N/A";
        document.getElementById('studentDetailBox').style.display='grid';
        document.getElementById('subjectStep').style.display='block';
    }

    const colMap = { english:[7,8,9,10], hindi:[11,12,13,14], math:[15,16,17,18], science:[19,20,21,22], social:[23,24,25,26], computer:[27,28,29,30], drawing:[31,32,33,34] };

    function calculateGrade(m) {
        if (m >= 160) return 'A+'; if (m >= 120) return 'A';
        if (m >= 90) return 'B'; if (m >= 66) return 'C'; return 'D';
    }

    function loadMarks() {
        const sub = document.getElementById('tSubject').value;
        const i = document.getElementById('tStudent').value;
        if(!sub || !i) return;
        const cols = colMap[sub];
        document.getElementById('m1').value = MASTER[i][cols[0]] || 0;
        document.getElementById('m2').value = MASTER[i][cols[1]] || 0;
        document.getElementById('m3').value = MASTER[i][cols[2]] || 0;
        document.getElementById('m4').value = MASTER[i][cols[3]] || 0;
        document.getElementById('marksArea').style.display='block';
        document.getElementById('curSubTitle').innerText = sub.toUpperCase();
    }

    async function saveData() {
        const i = document.getElementById('tStudent').value;
        const sub = document.getElementById('tSubject').value;
        const vals = [document.getElementById('m1').value, document.getElementById('m2').value, document.getElementById('m3').value, document.getElementById('m4').value];
        document.getElementById('loader').style.display='flex';
        await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMarks", rowIndex: parseInt(i), colIndexes: colMap[sub], newValues: vals}) });
        alert("Saved!"); sync();
    }

    function uploadCSV() {
        const file = document.getElementById('csvFile').files[0];
        if(!file) return alert("Select File!");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const rows = e.target.result.split("\n").map(r => r.split(","));
            document.getElementById('loader').style.display='flex';
            await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMaster", data: rows}) });
            alert("Updated!"); sync();
        };
        reader.readAsText(file);
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value.toUpperCase();
        if(!cls) return alert("Select Class!");
        let h = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] && r[3].toString().trim().toUpperCase() === cls) {
                let rows = '', gt = 0;
                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    gt += t;
                    rows += `<tr><td class="subject-cell">${s.toUpperCase()}</td><td>${r[c[0]]||0}</td><td>${r[c[1]]||0}</td><td>${r[c[2]]||0}</td><td>${r[c[3]]||0}</td><td style="background:#fff9c4!important">${t}</td><td>${calculateGrade(t)}</td></tr>`;
                });
                h += `<div class="marksheet-page">
                    <div style="text-align:center;">
                        <h1 style="color:#d32f2f; margin:0; font-size:32px;">K.R.R. JUNIOR HIGH SCHOOL</h1>
                        <p style="margin:5px; font-weight:bold;">MANPUR BAHERI ( BAREILLY ) 243201</p>
                        <p style="color:#1a237e; font-weight:bold;">SESSION : 2025 - 2026</p>
                    </div>
                    <div class="m-banner">PROGRESS REPORT</div>
                    <table style="width:100%; margin-bottom:10px; font-size:17px; line-height:1.7;">
                        <tr><td colspan="2">Student Name : <b style="color:#d32f2f; border-bottom:1px solid #000;">${r[0]}</b></td></tr>
                        <tr><td>Mother's Name : <b>Mrs. ${r[1]}</b></td><td>Roll No : <b>${r[4]}</b></td></tr>
                        <tr><td>Father's Name : <b>Mr. ${r[2]}</b></td><td>Class : <b>${r[3]}</b></td></tr>
                        <tr><td>Date of Birth : <b>${formatDate(r[5])}</b></td><td>PEN NO. : <b>${r[6]||"---"}</b></td></tr>
                    </table>
                    <table class="m-marks-table">
                        <thead><tr style="background:#f2f2f2"><th>Subjects</th><th>FA I+II</th><th>Half Yearly</th><th>FA III+IV</th><th>Annual</th><th>Total</th><th>Grade</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="m-result-box">
                        <span>RESULT: PASS</span><span>GRAND TOTAL: ${gt}/1400</span><span>PERCENTAGE: ${(gt/14).toFixed(2)}%</span>
                    </div>
                    <div style="margin-top:20px; font-weight:bold;">Status: Promoted to Class <span style="color:#d32f2f; border-bottom:2px solid #d32f2f;">IX</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:80px;">
                        <div style="border-top:1px solid #000; width:150px; text-align:center;">Parent's Sign</div>
                        <div style="border-top:1px solid #000; width:150px; text-align:center;">Class Teacher</div>
                        <div style="border-top:1px solid #000; width:150px; text-align:center;">Principal</div>
                    </div>
                </div>`;
            }
        });
        const w = window.open('', '_blank');
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${h}</body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 800);
    }
</script>
</body>
</html>
