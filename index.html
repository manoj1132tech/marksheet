<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.R.R. School - Portal & Marksheet</title>
    <style>
        :root { 
            --main-red: #d32f2f; --purple-banner: #673ab7; --gold: #b8860b; 
            --blue: #1a237e; --subject-bg: #f1f8ff; --total-bg: #fff9c4;
            --header-fa: #e8f5e9; --header-hy: #e1f5fe; --header-an: #f3e5f5;
        }
        
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 0; }

        /* Navigation */
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index:1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px 15px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--main-red); }

        .container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }

        /* Step Boxes */
        .step-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); margin-bottom: 15px; }
        .student-preview { background: #fffde7; padding: 15px; border: 1px solid var(--gold); border-radius: 8px; margin-bottom: 15px; display: none; }
        .student-preview h4 { margin: 0 0 10px 0; color: var(--main-red); text-decoration: underline; }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* --- MARKSHEET DESIGN (From Your Code) --- */
        #wrapper { background: #444; padding: 20px 0; display: none; }
        .page {
            width: 210mm; height: 297mm; padding: 15mm; margin: 10mm auto;
            background: #fffdf5; box-sizing: border-box; position: relative;
            page-break-after: always; border: 6px double var(--main-red);
            outline: 2px solid var(--gold); outline-offset: -12px;
            box-shadow: inset 0 0 0 15px white, inset 0 0 0 17px var(--gold);
            overflow: hidden; display: flex; flex-direction: column;
            -webkit-print-color-adjust: exact; print-color-adjust: exact;
        }
        /* ... (Baki CSS wahi hai jo aapne di thi) ... */
        .school-name { font-size: 36px; font-weight: 900; color: var(--main-red); text-align: center; margin: 0; }
        .banner { background: var(--purple-banner) !important; color: white; font-size: 22px; font-weight: bold; padding: 6px; text-align: center; width: 40%; margin: 15px auto; border-radius: 30px; border: 2px solid var(--gold); }
        .marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        .marks-table th, .marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; }
        .subject-cell { text-align: left !important; padding-left: 12px !important; background: var(--subject-bg) !important; color: #0d47a1; width: 180px; }
        .result-box { margin-top: 20px; border: 2px solid var(--main-red); padding: 12px; display: flex; justify-content: space-between; background: #fff9e6 !important; font-weight: bold; }
        .floral-divider { text-align: center; margin-top: auto; color: var(--gold); font-size: 24px; letter-spacing: 10px; }

        @media print { .no-print { display: none !important; } .page { margin: 0; } #wrapper { background: white; display: block; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2 style="margin:0;">K.R.R. JUNIOR HIGH SCHOOL - PORTAL</h2>
    <div style="margin-top:10px;">
        <button class="nav-btn active" onclick="showTab('teacher')">TEACHER ENTRY</button>
        <button class="nav-btn" onclick="showTab('admin')">ADMIN (CSV PRINT)</button>
    </div>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <div class="step-box">
            <label>1. Select Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Choose Class --</option>
                <option value="I">Class I</option>
                <option value="II">Class II</option>
                <option value="III">Class III</option>
                <option value="IV">Class IV</option>
                <option value="V">Class V</option>
                <option value="VI">Class VI</option>
                <option value="VII">Class VII</option>
                <option value="VIII">Class VIII</option>
            </select>
        </div>

        <div id="studentStep" class="step-box" style="display:none;">
            <label>2. Select Student</label>
            <select id="tStudent" onchange="showStudentDetail()"></select>
        </div>

        <div id="studentDetail" class="student-preview">
            <h4>Student Information</h4>
            <div id="detailContent" style="font-size: 16px; line-height: 1.6;"></div>
        </div>

        <div id="marksStep" class="step-box" style="display:none;">
            <label>3. Upload Marks for Subject</label>
            <select id="tSubject">
                <option value="hindi">HINDI</option>
                <option value="english">ENGLISH</option>
                <option value="math">MATHEMATICS</option>
                <option value="science">SCIENCE</option>
                <option value="social">SOCIAL SCIENCE</option>
                <option value="computer">COMPUTER & G.K.</option>
                <option value="drawing">DRAWING</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <input type="number" id="m1" placeholder="FA I+II (30)">
                <input type="number" id="m2" placeholder="Half Yearly (70)">
                <input type="number" id="m3" placeholder="FA III+IV (30)">
                <input type="number" id="m4" placeholder="Annual Exam (70)">
            </div>
            <button class="btn-action" style="margin-top:15px;" onclick="saveMarks()">SAVE & SYNC MARKS</button>
        </div>
    </div>

    <div id="admin" class="section">
        <div class="step-box" style="text-align:center;">
            <label>Upload CSV File to Generate Marksheets</label><br>
            <input type="file" id="csvFileInput" accept=".csv" style="margin: 15px 0;">
            <button class="btn-action" style="background:var(--main-red);" onclick="window.print()">PRINT ALL MARKSHEETS</button>
        </div>
    </div>
</div>

<div id="wrapper"></div>

<script>
    // Mock Database (Yeh data aapke Google Sheet/Firebase se aayega)
    let MASTER = [];
    const API_URL = "YOUR_APPS_SCRIPT_URL";

    async function syncData() {
        // Fetch logic yahan aayega
        const response = await fetch(API_URL);
        MASTER = await response.json();
    }
    syncData();

    function showTab(id) {
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('wrapper').style.display = (id === 'admin') ? 'block' : 'none';
    }

    function filterStudents() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Choose Student --</option>';
        
        MASTER.forEach((row, index) => {
            if(index > 0 && row[3] == cls) {
                sel.add(new Option(row[0], index));
            }
        });
        document.getElementById('studentStep').style.display = 'block';
    }

    function showStudentDetail() {
        const index = document.getElementById('tStudent').value;
        if(!index) return;
        
        const s = MASTER[index];
        const html = `
            <b>Name:</b> ${s[0]} <br>
            <b>Father's Name:</b> Mr. ${s[2]} <br>
            <b>Mother's Name:</b> Mrs. ${s[1]} <br>
            <b>Roll No:</b> ${s[4]} | <b>DOB:</b> ${s[5]}
        `;
        document.getElementById('detailContent').innerHTML = html;
        document.getElementById('studentDetail').style.display = 'block';
        document.getElementById('marksStep').style.display = 'block';
    }

    async function saveMarks() {
        alert("Saving marks to database... Please wait.");
        // Yahan aap fetch(API_URL, {method: 'POST'...}) ka use karenge marks update karne ke liye
    }

    // --- CSV PRINT LOGIC (Aapka Diya Hua) ---
    // ... (Wahi code jo aapne last message mein bheja tha) ...
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const lines = reader.result.split(/\r?\n/);
            const wrapper = document.getElementById('wrapper');
            wrapper.innerHTML = '';
            // Aapka logic yahan continue hoga...
        }
        reader.readAsText(e.target.files[0]);
    });
</script>
</body>
</html>
