<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR School Portal - Final Edition</title>
    <style>
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; 
            --sub-bg: #fdfcf0;
        }

        body { font-family: 'Times New Roman', serif; background: #f4f4f4; margin: 0; }
        .no-print { padding: 20px; text-align: center; background: var(--blue); color: white; }
        .nav-btn { padding: 10px 20px; margin: 5px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; }
        .active { background: var(--red); color: white; }

        /* --- PRINT MARKSHEET DESIGN --- */
        .marksheet-page {
            width: 210mm; height: 297mm; padding: 12mm 15mm; margin: 0 auto;
            background: #fffdf5 !important; position: relative; box-sizing: border-box;
            border: 8px double var(--red) !important;
            outline: 2px solid var(--gold) !important; outline-offset: -12px;
            page-break-after: always; display: flex; flex-direction: column;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }

        /* Watermark Opacity 0.70 */
        .marksheet-page::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 450px; background: url('2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg') no-repeat center;
            background-size: contain; opacity: 0.70; z-index: 0;
        }

        .m-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }
        .m-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .m-school-name { font-size: 34px; font-weight: 900; color: var(--red) !important; margin: 0; }
        
        .m-banner { 
            background: var(--red) !important; color: white !important; font-size: 22px; font-weight: bold;
            padding: 8px 50px; text-align: center; width: fit-content; margin: 15px auto; 
            border-radius: 40px; border: 2px solid var(--gold);
        }

        /* Info Table - Underline only for Name */
        .m-info-table { width: 100%; margin: 10px 0; font-size: 19px; border-collapse: collapse; line-height: 1.8; }
        .m-name-underline { border-bottom: 2px solid #000; font-weight: bold; color: var(--red); padding: 0 5px; }
        .m-val { font-weight: bold; color: #000; padding: 0 5px; }

        /* Colorful Table */
        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-top: 10px; }
        .m-marks-table th { background: #333 !important; color: white !important; padding: 8px 2px; font-size: 13px; border: 1px solid #000; }
        .m-marks-table td { border: 1px solid #000; padding: 7px 4px; text-align: center; font-weight: bold; font-size: 15px; background: #fff !important; }
        
        .sub-name { text-align: left !important; padding-left: 10px !important; color: var(--blue) !important; width: 160px; }
        .total-cell { background: #fff9c4 !important; color: #000 !important; border: 1.5px solid #000 !important; }
        .grade-cell { color: var(--red) !important; font-weight: 900 !important; }

        /* Result Box - Round & Colorful */
        .m-result-box { 
            margin-top: 20px; border: 2.5px solid var(--red); padding: 12px; 
            display: flex; justify-content: space-between; 
            background: #fff9e6 !important; border-radius: 40px; 
            font-size: 18px; font-weight: bold; 
        }

        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 5px; }
        .m-sig-box { border-top: 2px solid #000; width: 160px; text-align: center; font-weight: bold; padding-top: 5px; font-size: 14px; }
        
        .floral-line { text-align: center; font-size: 24px; margin-top: 10px; letter-spacing: 5px; }
        .f-gold { color: var(--gold); } .f-red { color: var(--red); }

        @media print { 
            .no-print { display: none; } 
            body { background: white; margin: 0; } 
            .marksheet-page { border: 8px double var(--red) !important; margin: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2>K.R.R. JUNIOR HIGH SCHOOL - ADMIN PANEL</h2>
    <button class="nav-btn active">Print Management</button>
    <div style="margin-top:20px;">
        <select id="printClass" style="padding:10px; width:200px;">
            <option value="I">Class I</option><option value="II">Class II</option><option value="III">Class III</option>
            <option value="IV">Class IV</option><option value="V">Class V</option><option value="VI">Class VI</option>
            <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
        </select>
        <button class="nav-btn" style="background:white; color:black;" onclick="generatePrint()">Generate A4 Marksheets</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    let MASTER = [];

    async function sync() {
        const res = await fetch(API); MASTER = await res.json();
    }
    sync();

    const colMap = { 
        hindi:[11,12,13,14], english:[7,8,9,10], math:[15,16,17,18], science:[19,20,21,22], 
        social:[23,24,25,26], computer:[27,28,29,30], drawing:[31,32,33,34], physical:[35,36,37,38] 
    };

    function getGrade(m) {
        if (m >= 180) return 'A+'; if (m >= 150) return 'A';
        if (m >= 120) return 'B'; if (m >= 90) return 'C'; if (m >= 66) return 'D'; return 'E';
    }

    function formatDate(val) {
        if(!val) return "---";
        let d = new Date(val.toString().split('T')[0]);
        if(isNaN(d)) return val;
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value;
        let html = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] == cls) {
                let rows = '', gt = 0;
                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    let sName = s === 'social' ? 'SOCIAL SCIENCE' : s === 'physical' ? 'PHY. HEALTH EDU.' : s.toUpperCase();
                    
                    if(s === 'physical') {
                        rows += `<tr><td class="sub-name">${sName}</td><td>-</td><td>-</td><td>-</td><td>-</td><td class="total-cell">-</td><td class="grade-cell">A</td></tr>`;
                    } else {
                        gt += t;
                        rows += `<tr><td class="sub-name">${sName}</td><td>${r[c[0]]||0}</td><td>${r[c[1]]||0}</td><td>${r[c[2]]||0}</td><td>${r[c[3]]||0}</td><td class="total-cell">${t}</td><td class="grade-cell">${getGrade(t)}</td></tr>`;
                    }
                });

                const perc = (gt / 14).toFixed(2);
                const isPass = perc >= 33;
                
                // Dynamic Remarks Logic
                let remarks = "";
                if(perc >= 80) remarks = "Excellent Performance!";
                else if(perc >= 60) remarks = "Very Good, Keep it up.";
                else if(isPass) remarks = "Good, work hard for more.";
                else remarks = "Needs Improvement.";

                html += `
                <div class="marksheet-page">
                    <div class="m-content">
                        <div class="m-header">
                            <div style="display:flex; align-items:center; justify-content:space-between;">
                                <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" style="width:80px; border-radius:50%;">
                                <div style="flex:1;">
                                    <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                                    <p style="margin:4px; font-weight:bold;">MANPUR BAHERI, BAREILLY (U.P.)</p>
                                    <p style="color:var(--blue); font-weight:bold; margin:0;">SESSION : 2025 - 2026</p>
                                </div>
                                <div style="width:80px;"></div>
                            </div>
                        </div>
                        <div class="m-banner">PROGRESS REPORT</div>
                        <table class="m-info-table">
                            <tr>
                                <td colspan="2">Student Name : <span class="m-name-underline">${r[0]}</span></td>
                            </tr>
                            <tr>
                                <td width="65%">Mother Name : <span class="m-val">Mrs. ${r[1]}</span></td>
                                <td>Roll No : <span class="m-val">${r[4]}</span></td>
                            </tr>
                            <tr>
                                <td>Father Name : <span class="m-val">Mr. ${r[2]}</span></td>
                                <td>Class : <span class="m-val">${r[3]}</span></td>
                            </tr>
                            <tr>
                                <td>Date of Birth : <span class="m-val">${formatDate(r[5])}</span></td>
                                <td>PEN No : <span class="m-val">${r[6]||"---"}</span></td>
                            </tr>
                        </table>
                        <table class="m-marks-table">
                            <thead>
                                <tr><th rowspan="2">SUBJECTS</th><th>FA I+II</th><th>HALF YEARLY</th><th>FA III+IV</th><th>ANNUAL</th><th class="total-cell">TOTAL</th><th>GRADE</th></tr>
                                <tr><th>30</th><th>70</th><th>30</th><th>70</th><th>200</th><th>-</th></tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                        <div class="m-result-box">
                            <span style="color:${isPass?'green':'red'}">Result Status: ${isPass?'PASS':'FAIL'}</span>
                            <span>Grand Total: ${gt}/1400</span>
                            <span>Percentage: ${perc}%</span>
                        </div>
                        <div style="margin-top:15px; font-size:18px; font-weight:bold;">
                            <span style="color:green">Teacher Remarks: ${remarks}</span><br><br>
                            <span>Promotion: <span style="text-decoration:underline;">${isPass ? 'Promoted to next class' : 'Detained in same class'}</span></span>
                        </div>
                        <div class="m-sig-row">
                            <div class="m-sig-box">Guardian Sign</div><div class="m-sig-box">Class Teacher</div><div class="m-sig-box">Principal</div>
                        </div>
                        <div class="floral-line">
                            <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span> <span class="f-red">❀</span> <span class="f-gold">❦</span>
                        </div>
                    </div>
                </div>`;
            }
        });
        const w = window.open('', '_blank');
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 1000);
    }
</script>
</body>
</html>
