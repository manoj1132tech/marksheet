<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K.R.R. JUNIOR HIGH SCHOOL - Full System</title>
    <style>
        :root { 
            --main-red: #d32f2f; --purple-banner: #673ab7; --gold: #b8860b; 
            --blue: #1a237e; --subject-bg: #f1f8ff; --total-bg: #fff9c4;
            --header-fa: #e8f5e9; --header-hy: #e1f5fe; --header-an: #f3e5f5;
        }
        
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 0; }

        /* Navigation Style */
        .no-print { background: var(--blue); padding: 15px; text-align: center; color: white; border-bottom: 3px solid var(--gold); }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--main-red); }

        .container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }

        /* Form Elements */
        .step-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); margin-bottom: 15px; }
        select, input { width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .preview-card { background: #fffde7; padding: 15px; border: 1px solid var(--gold); border-radius: 8px; margin-bottom: 15px; display: none; }
        .btn-save { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* --- YOUR MARKSHEET DESIGN --- */
        #printWrapper { background: #444; padding: 20px 0; display: none; }
        .page {
            width: 210mm; height: 297mm; padding: 15mm; margin: 10mm auto;
            background: #fffdf5; box-sizing: border-box; position: relative;
            page-break-after: always; border: 6px double var(--main-red);
            outline: 2px solid var(--gold); outline-offset: -12px;
            box-shadow: inset 0 0 0 15px white, inset 0 0 0 17px var(--gold);
            overflow: hidden; display: flex; flex-direction: column;
            -webkit-print-color-adjust: exact;
        }

        .page::before {
            content: ""; position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); 
            width: 480px; height: 480px; background-image: url('2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg');
            background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.15; z-index: 0;
        }

        .school-name { font-size: 36px; font-weight: 900; color: var(--main-red); text-align: center; margin: 0; text-transform: uppercase; }
        .banner { background: var(--purple-banner) !important; color: white; font-size: 22px; font-weight: bold; padding: 6px; text-align: center; width: 40%; margin: 15px auto; border-radius: 30px; border: 2px solid var(--gold); position: relative; z-index: 1; }
        .marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; position: relative; z-index: 1; background: rgba(255,255,255,0.6); }
        .marks-table th, .marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; }
        .subject-cell { text-align: left !important; padding-left: 12px !important; background: var(--subject-bg) !important; color: #0d47a1; width: 180px; }
        .result-box { margin-top: 20px; border: 2px solid var(--main-red); padding: 12px; display: flex; justify-content: space-between; background: #fff9e6 !important; font-weight: bold; position: relative; z-index: 1; }
        .floral-divider { text-align: center; margin-top: auto; color: var(--gold); font-size: 24px; letter-spacing: 10px; }

        @media print {
            .no-print, .container { display: none !important; }
            body { background: white; }
            #printWrapper { display: block !important; background: white; padding: 0; }
            .page { margin: 0; box-shadow: none; border: 6px double var(--main-red) !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2 style="margin:0;">K.R.R. JUNIOR HIGH SCHOOL - PORTAL</h2>
    <div style="margin-top:10px;">
        <button class="nav-btn active" onclick="showTab('teacher')">TEACHER (Marks Entry)</button>
        <button class="nav-btn" onclick="showTab('admin')">ADMIN (CSV & Print)</button>
    </div>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <div class="step-box">
            <label>1. Select Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Select --</option>
                <option value="I">Class I</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div id="studentStep" class="step-box" style="display:none;">
            <label>2. Select Student</label>
            <select id="tStudent" onchange="showDetail()"></select>
        </div>
        <div id="previewCard" class="preview-card">
            <h4 style="margin:0; color:var(--main-red);">Student Information</h4>
            <div id="detailInfo"></div>
        </div>
        <div id="marksForm" class="step-box" style="display:none;">
            <label>3. Enter Marks</label>
            <select id="tSub">
                <option value="hindi">HINDI</option><option value="math">MATHS</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="m1" placeholder="FA I+II (30)">
                <input type="number" id="m2" placeholder="Half Yearly (70)">
                <input type="number" id="m3" placeholder="FA III+IV (30)">
                <input type="number" id="m4" placeholder="Annual (70)">
            </div>
            <button class="btn-save" onclick="alert('Marks Saved to Session!')">SAVE MARKS</button>
        </div>
    </div>

    <div id="admin" class="section">
        <div class="step-box">
            <label>Upload Student Database (CSV)</label>
            <input type="file" id="csvFileInput" accept=".csv">
        </div>
        <div class="step-box">
            <label>Print Marksheets by Class</label>
            <select id="pClass">
                <option value="VIII">Class VIII</option><option value="I">Class I</option>
            </select>
            <button class="btn-save" style="background:var(--main-red);" onclick="generateAndPrint()">GENERATE & PRINT ALL</button>
        </div>
    </div>
</div>

<div id="printWrapper"></div>

<script>
    let MASTER = [];

    function showTab(id) {
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        // Button highlight logic
        event.target.classList.add('active');
    }

    // Backend: CSV Upload Logic
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const lines = reader.result.split(/\r?\n/);
            MASTER = lines.map(line => line.split(','));
            alert("Database Loaded: " + (MASTER.length - 1) + " students found.");
        };
        reader.readAsText(e.target.files[0]);
    });

    // Backend: Teacher Selection Logic
    function filterStudents() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Choose Student --</option>';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] && r[3].trim() == cls) sel.add(new Option(r[0], i));
        });
        document.getElementById('studentStep').style.display = 'block';
    }

    function showDetail() {
        const i = document.getElementById('tStudent').value;
        if(!i) return;
        const s = MASTER[i];
        document.getElementById('detailInfo').innerHTML = `<b>Roll:</b> ${s[4]} | <b>Father:</b> Mr. ${s[2]} | <b>Mother:</b> Mrs. ${s[1]}`;
        document.getElementById('previewCard').style.display = 'block';
        document.getElementById('marksForm').style.display = 'block';
    }

    // Design: Marksheet Generation
    function getGrade(m) { return m>=180?'A+':m>=150?'A':m>=120?'B':m>=90?'C':m>=66?'D':'E'; }

    function generateAndPrint() {
        const cls = document.getElementById('pClass').value;
        const wrapper = document.getElementById('printWrapper');
        wrapper.innerHTML = '';
        
        MASTER.forEach((s, i) => {
            if(i > 0 && s[3] && s[3].trim() == cls) {
                let gt = 0;
                let rows = '';
                // Subject index mappings based on your CSV
                const subjects = [
                    {n: "ENGLISH", c: [7,8,9,10]}, {n: "HINDI", c: [11,12,13,14]},
                    {n: "MATHEMATICS", c: [15,16,17,18]}, {n: "SCIENCE", c: [19,20,21,22]},
                    {n: "SOCIAL SCIENCE", c: [23,24,25,26]}, {n: "COMPUTER/GK", c: [27,28,29,30]},
                    {n: "DRAWING", c: [31,32,33,34]}
                ];

                subjects.forEach(sub => {
                    const t = (parseInt(s[sub.c[0]])||0)+(parseInt(s[sub.c[1]])||0)+(parseInt(s[sub.c[2]])||0)+(parseInt(s[sub.c[3]])||0);
                    gt += t;
                    rows += `<tr><td class="subject-cell">${sub.n}</td><td>${s[sub.c[0]]||0}</td><td>${s[sub.c[1]]||0}</td><td>${s[sub.c[2]]||0}</td><td>${s[sub.c[3]]||0}</td><td style="background:var(--total-bg)!important;">${t}</td><td>${getGrade(t)}</td></tr>`;
                });

                wrapper.innerHTML += `
                <div class="page">
                    <div style="display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;">
                        <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" style="width:85px; border-radius:50%;">
                        <div style="flex:1; text-align:center;">
                            <h1 class="school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                            <p style="font-weight:bold; margin:3px;">MANPUR BAHERI (BAREILLY) 243201</p>
                            <p style="color:#1a2a6c; font-weight:bold; margin:0;">SESSION : 2025 - 2026</p>
                        </div>
                        <div style="width:85px;"></div>
                    </div>
                    <div class="banner">PROGRESS REPORT</div>
                    <table style="width:100%; margin:15px 0; font-size:18px; position:relative; z-index:1;">
                        <tr><td colspan="2">Student Name :- <span style="border-bottom:1.5px solid #000; font-weight:bold; color:var(--main-red);">${s[0]}</span></td></tr>
                        <tr><td>Mother :- <span style="font-weight:bold;">Mrs. ${s[1]}</span></td><td>Roll No :- <span style="font-weight:bold;">${s[4]}</span></td></tr>
                        <tr><td>Father :- <span style="font-weight:bold;">Mr. ${s[2]}</span></td><td>Class :- <span style="font-weight:bold;">${s[3]}</span></td></tr>
                    </table>
                    <table class="marks-table">
                        <thead>
                            <tr><th rowspan="2" class="subject-cell">Subjects</th><th class="h-fa">FA(I+II)</th><th class="h-hy">Half Yearly</th><th class="h-fa">FA(III+IV)</th><th class="h-an">Annual</th><th class="h-tt">Total</th><th>Grade</th></tr>
                            <tr><th>30</th><th>70</th><th>30</th><th>70</th><th>200</th><th>-</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="result-box"><span>Final Result: PASS</span><span>Grand Total: ${gt}/1400</span><span>Percentage: ${(gt/14).toFixed(2)}%</span></div>
                    <div style="display:flex; justify-content:space-between; margin-top:50px; position:relative; z-index:1;">
                        <div style="border-top:2px solid #000; width:170px; text-align:center; font-weight:bold;">Guardian Sign</div>
                        <div style="border-top:2px solid #000; width:170px; text-align:center; font-weight:bold;">Teacher Sign</div>
                        <div style="border-top:2px solid #000; width:170px; text-align:center; font-weight:bold;">Principal Sign</div>
                    </div>
                    <div class="floral-divider">❦ ❀ ❦</div> <span = "❀" </span> 
                </div>`;
            }
        });

        document.getElementById('printWrapper').style.display = 'block';
        setTimeout(() => { window.print(); }, 500);
    }
</script>
</body>
</html>
