<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR School Portal - Full System</title>
    <style>
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; 
            --banner-bg: #673ab7; --border-clr: #d32f2f;
        }

        /* --- UI STYLES --- */
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; }
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index:1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; font-weight: bold; }
        .nav-btn.active { background: var(--red); }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        .step-box { margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f8f9fa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }

        /* --- PRINT MARKSHEET DESIGN --- */
        .marksheet-page {
            width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto;
            background: #fffdf5 !important; position: relative; box-sizing: border-box;
            border: 8px double var(--red) !important;
            outline: 2px solid var(--gold) !important; outline-offset: -12px;
            page-break-after: always; display: flex; flex-direction: column;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }

        .m-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .m-school-name { font-size: 34px; font-weight: 900; color: var(--red); margin: 0; }
        
        .m-banner { 
            background: #673ab7 !important; color: white !important; font-size: 24px; font-weight: bold;
            padding: 10px 60px; text-align: center; width: fit-content; margin: 15px auto; 
            border-radius: 50px; border: 2px solid var(--gold); text-transform: uppercase;
        }

        .m-info-table { width: 100%; margin: 15px 0; font-size: 18px; border-collapse: collapse; }
        .m-underline { border-bottom: 1.5px solid #000; font-weight: bold; color: #d32f2f; padding: 0 8px; }

        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        .m-marks-table th { background: #444 !important; color: white !important; padding: 8px; font-size: 13px; border: 1px solid #000; }
        .m-marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; font-size: 15px; }

        .total-col { background: #fff176 !important; color: #000 !important; font-size: 16px; }

        .m-result-box { 
            margin-top: 20px; border: 2px solid var(--red); padding: 15px; 
            display: flex; justify-content: space-between; background: #e8f5e9 !important; 
            border-radius: 10px; font-size: 19px; font-weight: bold;
        }

        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 10px; }
        .m-sig-box { border-top: 2px solid #000; width: 170px; text-align: center; font-weight: bold; padding-top: 5px; }
        .floral-line { text-align: center; color: var(--gold); font-size: 26px; margin-top: 15px; letter-spacing: 5px; }

        @media print { .no-print { display: none; } body { background: white; } .marksheet-page { margin: 0 !important; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2>K.R.R. INTER COLLEGE PORTAL</h2>
    <button class="nav-btn active" onclick="showTab('teacher')">TEACHER ENTRY</button>
    <button class="nav-btn" onclick="showTab('admin')">ADMIN PANEL</button>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <h3>Marks Entry Portal</h3>
        <div class="step-box">
            <label>Select Class (I-VIII)</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Choose Class --</option>
                <option value="I">Class I</option><option value="II">Class II</option>
                <option value="III">Class III</option><option value="IV">Class IV</option>
                <option value="V">Class V</option><option value="VI">Class VI</option>
                <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div id="studentStep" class="step-box" style="display:none;">
            <label>Select Student</label>
            <select id="tStudent" onchange="showDetails()"></select>
        </div>
        <div id="subjectStep" class="step-box" style="display:none;">
            <label>Select Subject</label>
            <select id="tSubject" onchange="loadMarks()">
                <option value="">-- Choose Subject --</option>
                <option value="hindi">HINDI</option><option value="english">ENGLISH</option>
                <option value="math">MATHEMATICS</option><option value="science">SCIENCE</option>
                <option value="social">SOCIAL SCIENCE</option><option value="computer">COMPUTER/GK</option>
                <option value="drawing">DRAWING</option><option value="physical">PHY. HEALTH EDU.</option>
            </select>
        </div>
        <div id="marksArea" style="display:none; padding:15px; background:#fff; border:1px solid #ddd; border-radius:8px;">
            <h4 id="curSubTitle" style="color:var(--red);"></h4>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div>FA I+II (30): <input type="number" id="m1"></div>
                <div>Half Yearly (70): <input type="number" id="m2"></div>
                <div>FA III+IV (30): <input type="number" id="m3"></div>
                <div>Annual (70): <input type="number" id="m4"></div>
            </div>
            <button class="btn-action" onclick="saveData()">Update Marks</button>
        </div>
    </div>

    <div id="admin" class="section">
        <h3>Admin Controls</h3>
        <div class="step-box">
            <label>Upload Master CSV (All Data Sync)</label>
            <input type="file" id="csvFile" accept=".csv">
            <button class="btn-action" style="background:var(--blue);" onclick="uploadCSV()">Sync Master Data</button>
        </div>
        <div class="step-box">
            <label>Print Marksheets</label>
            <select id="printClass">
                <option value="I">Class I</option><option value="II">Class II</option><option value="III">Class III</option>
                <option value="IV">Class IV</option><option value="V">Class V</option><option value="VI">Class VI</option>
                <option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
            <button class="btn-action" style="background:var(--red);" onclick="generatePrint()">Generate A4 Marksheets</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    const ADMIN_PASS = "KRR@2026";
    let MASTER = [];

    async function sync() {
        try { const res = await fetch(API); MASTER = await res.json(); } catch(e) { console.error(e); }
    }
    sync();

    function showTab(id) {
        if (id === 'admin') { 
            let p = prompt("Enter Password:"); 
            if (p !== ADMIN_PASS) { alert("Wrong Password!"); return; } 
        }
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    const colMap = { 
        hindi:[11,12,13,14], english:[7,8,9,10], math:[15,16,17,18], 
        science:[19,20,21,22], social:[23,24,25,26], computer:[27,28,29,30], 
        drawing:[31,32,33,34], physical:[35,36,37,38] 
    };

    function filterStudents() {
        const cls = document.getElementById('tClass').value;
        const sel = document.getElementById('tStudent');
        sel.innerHTML = '<option value="">-- Choose Student --</option>';
        MASTER.forEach((r, i) => { if(i>0 && r[3] == cls) sel.add(new Option(r[0], i)); });
        document.getElementById('studentStep').style.display='block';
    }

    function showDetails() { document.getElementById('subjectStep').style.display='block'; }

    function loadMarks() {
        const sub = document.getElementById('tSubject').value;
        const i = document.getElementById('tStudent').value;
        const cols = colMap[sub];
        document.getElementById('m1').value = MASTER[i][cols[0]] || 0;
        document.getElementById('m2').value = MASTER[i][cols[1]] || 0;
        document.getElementById('m3').value = MASTER[i][cols[2]] || 0;
        document.getElementById('m4').value = MASTER[i][cols[3]] || 0;
        
        // Physical Education special rule
        const isPhy = sub === 'physical';
        document.getElementById('m1').disabled = isPhy;
        document.getElementById('m3').disabled = isPhy;
        
        document.getElementById('marksArea').style.display='block';
        document.getElementById('curSubTitle').innerText = sub.toUpperCase();
    }

    async function saveData() {
        const i = document.getElementById('tStudent').value;
        const sub = document.getElementById('tSubject').value;
        const vals = [document.getElementById('m1').value, document.getElementById('m2').value, document.getElementById('m3').value, document.getElementById('m4').value];
        await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMarks", rowIndex: parseInt(i), colIndexes: colMap[sub], newValues: vals}) });
        alert("Saved Successfully!"); sync();
    }

    function uploadCSV() {
        const file = document.getElementById('csvFile').files[0];
        if(!file) return alert("Select CSV File First!");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const rows = e.target.result.split("\n").map(r => r.split(","));
            await fetch(API, { method:"POST", body: JSON.stringify({action:"updateMaster", data: rows}) });
            alert("CSV Uploaded & Synced!"); sync();
        };
        reader.readAsText(file);
    }

    function getGrade(m) {
        if (m >= 180) return 'A+'; if (m >= 150) return 'A';
        if (m >= 120) return 'B'; if (m >= 90) return 'C'; if (m >= 66) return 'D'; return 'E';
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value;
        let html = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] == cls) {
                let rows = '', gt = 0;
                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    let sName = s === 'social' ? 'SOCIAL SCIENCE' : s === 'physical' ? 'PHY. HEALTH EDU.' : s.toUpperCase();
                    
                    if(s === 'physical') {
                        let g1 = getGrade((parseInt(r[c[1]])||0)*2.8);
                        let g2 = getGrade((parseInt(r[c[3]])||0)*2.8);
                        rows += `<tr><td>${sName}</td><td>-</td><td>${g1}</td><td>-</td><td>${g2}</td><td class="total-col">-</td><td>A</td></tr>`;
                    } else {
                        gt += t;
                        rows += `<tr><td>${sName}</td><td>${r[c[0]]||0}</td><td>${r[c[1]]||0}</td><td>${r[c[2]]||0}</td><td>${r[c[3]]||0}</td><td class="total-col">${t}</td><td>${getGrade(t)}</td></tr>`;
                    }
                });

                const perc = (gt / 14).toFixed(2);
                const isPass = perc >= 33;
                const nextCls = ["I","II","III","IV","V","VI","VII","VIII","IX"];
                const pCls = nextCls[nextCls.indexOf(cls)+1] || "IX";

                html += `
                <div class="marksheet-page">
                    <div class="m-header">
                        <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                        <p style="margin:5px; font-weight:bold;">MANPUR BAHERI, BAREILLY (U.P.)</p>
                        <p style="color:var(--blue); font-weight:bold;">SESSION : 2025 - 2026</p>
                    </div>
                    <div class="m-banner">PROGRESS REPORT</div>
                    <table class="m-info-table">
                        <tr><td width="60%">Student Name : <span class="m-underline">${r[0]}</span></td><td>Roll No : <span class="m-underline">${r[4]}</span></td></tr>
                        <tr><td>Father Name : <span class="m-underline">Mr. ${r[2]}</span></td><td>Class : <span class="m-underline">${r[3]}</span></td></tr>
                        <tr><td>Mother Name : <span class="m-underline">Mrs. ${r[1]}</span></td><td>Date of Birth : <span class="m-underline">${r[5]||'---'}</span></td></tr>
                    </table>
                    <table class="m-marks-table">
                        <thead>
                            <tr><th rowspan="2">SUBJECTS</th><th>FA I+II</th><th>HALF YEARLY</th><th>FA III+IV</th><th>ANNUAL</th><th class="total-col">TOTAL</th><th>GRADE</th></tr>
                            <tr><th>30</th><th>70</th><th>30</th><th>70</th><th>200</th><th>-</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="m-result-box">
                        <span style="color:${isPass?'green':'red'}">Result Status: ${isPass?'PASS':'FAIL'}</span>
                        <span>Grand Total: ${gt}/1400</span>
                        <span>Percentage: ${perc}%</span>
                    </div>
                    <div style="margin-top:20px; font-size:18px; font-weight:bold;">
                        Remarks: ${perc > 75 ? 'Excellent' : (perc > 33 ? 'Good' : 'Needs Improvement')} <br>
                        Promotion: <span style="text-decoration:underline;">${isPass ? 'Promoted to Class ' + pCls : 'Detained in same class'}</span>
                    </div>
                    <div class="m-sig-row">
                        <div class="m-sig-box">Guardian Sign</div><div class="m-sig-box">Class Teacher</div><div class="m-sig-box">Principal Sign</div>
                    </div>
                    <div class="floral-line">❦ ❀ ❦ ❀ ❦ ❀ ❦ ❀ ❦</div>
                </div>`;
            }
        });
        const w = window.open('', '_blank');
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${html}</body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 1000);
    }
</script>
</body>
</html>
