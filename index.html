<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRR Portal - A4 Pro Marksheet</title>
    <style>
        :root { 
            --red: #d32f2f; --gold: #b8860b; --blue: #1a237e; 
            --banner-bg: #673ab7; --border-clr: #d32f2f;
        }

        /* --- PORTAL UI STYLES --- */
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; }
        .nav-bar { background: var(--blue); padding: 15px; text-align: center; color: white; position: sticky; top:0; z-index:1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin: 5px; }
        .nav-btn.active { background: var(--red); }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { display: none; }
        .section.active { display: block; }
        .step-box { margin-bottom: 15px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--blue); background: #f8f9fa; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; }
        .btn-action { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* --- A4 MARKSHEET PRINT DESIGN --- */
        .marksheet-page {
            width: 210mm; height: 297mm; padding: 12mm; margin: 10px auto;
            background: #fffdf5 !important; position: relative; box-sizing: border-box;
            border: 8px double var(--border-clr) !important;
            outline: 2px solid var(--gold) !important; outline-offset: -15px;
            page-break-after: always; color: #000; overflow: hidden;
            display: flex; flex-direction: column;
            -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
        }

        /* Full Page Floral Watermark */
        .marksheet-page::before {
            content: "❦ ❀ ❦"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-wrap: wrap; justify-content: space-around; align-content: space-around;
            font-size: 80px; color: var(--gold); opacity: 0.05; z-index: 0; pointer-events: none;
        }
        
        /* Central School Logo Watermark */
        .watermark-logo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; opacity: 0.70; z-index: 0;
        }

        .m-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }
        
        .m-header { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 10px; }
        .m-school-name { font-size: 36px; font-weight: 900; color: var(--red); margin: 0; letter-spacing: 1px; }
        
        .m-banner { 
            background: var(--banner-bg) !important; color: white !important; font-size: 22px; 
            padding: 8px 40px; text-align: center; width: fit-content; margin: 10px auto; 
            border-radius: 50px; border: 2px solid var(--gold); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .m-info-table { width: 100%; margin: 15px 0; font-size: 18px; border-collapse: collapse; }
        .m-info-table td { padding: 6px 0; }
        .m-underline { border-bottom: 1.5px solid #444; font-weight: bold; color: #d32f2f; padding: 0 5px; }

        .m-marks-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-top: 5px; }
        .m-marks-table th { background: #333 !important; color: white !important; padding: 10px 4px; font-size: 14px; border: 1px solid #000; }
        .m-marks-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: bold; font-size: 16px; }

        /* Colorful Subject Rows */
        .row-hindi { background: #fff5f5 !important; }
        .row-english { background: #f5f5ff !important; }
        .row-math { background: #f5fff5 !important; }
        .row-science { background: #fffdf0 !important; }
        .row-social { background: #f0fcff !important; }
        .row-comp { background: #fdf0ff !important; }
        .row-draw { background: #fff0f5 !important; }
        .row-phy { background: #e8f5e9 !important; }

        .m-result-box { 
            margin-top: 20px; border: 2px solid var(--red); padding: 15px; 
            display: flex; justify-content: space-between; background: #fff9c4 !important; 
            border-radius: 10px; font-size: 19px; font-weight: bold;
        }

        .m-sig-row { display: flex; justify-content: space-between; margin-top: auto; padding-bottom: 15px; }
        .m-sig-box { border-top: 2px solid #000; width: 180px; text-align: center; font-weight: bold; padding-top: 8px; }

        @media print { .no-print { display: none; } body { background: white; } .marksheet-page { margin: 0; border: 8px double var(--red) !important; } }
    </style>
</head>
<body>

<div class="nav-bar no-print">
    <h2>K.R.R. PORTAL - ADMIN CONTROL</h2>
    <button class="nav-btn active" onclick="showTab('teacher')">ENTRY MODE</button>
    <button class="nav-btn" onclick="showTab('admin')">ADMIN (PRINT)</button>
</div>

<div class="container no-print">
    <div id="teacher" class="section active">
        <div class="step-box">
            <label>1. Choose Class</label>
            <select id="tClass" onchange="filterStudents()">
                <option value="">-- Select --</option>
                <option value="VI">Class VI</option><option value="VII">Class VII</option><option value="VIII">Class VIII</option>
            </select>
        </div>
        <div id="studentStep" class="step-box" style="display:none;">
            <label>2. Select Student</label>
            <select id="tStudent"></select>
        </div>
        <button class="btn-action" onclick="alert('Proceed to Marks Entry...')">Load Marks Entry</button>
    </div>

    <div id="admin" class="section">
        <div class="step-box">
            <label>Print Bulk Marksheets</label>
            <select id="printClass">
                <option value="VIII">Class VIII</option><option value="VII">Class VII</option><option value="VI">Class VI</option>
            </select>
            <button class="btn-action" style="background:var(--red);" onclick="generatePrint()">Generate & Print A4</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwf6Ay8MZy0Qr3vkhFFDGR0a0azE5amQMVIh0BMTD2T3Uxoah5fxwUFQVfUQ7frr8a7ZQ/exec";
    let MASTER = [];

    async function sync() {
        try { const res = await fetch(API); MASTER = await res.json(); } catch(e) { console.error(e); }
    }
    sync();

    function showTab(id) {
        document.querySelectorAll('.section, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    const colMap = { 
        hindi:[11,12,13,14], english:[7,8,9,10], math:[15,16,17,18], 
        science:[19,20,21,22], social:[23,24,25,26], computer:[27,28,29,30], 
        drawing:[31,32,33,34], physical:[35,36,37,38] 
    };

    function getGrade(m) {
        if (m >= 180) return 'A+'; if (m >= 150) return 'A';
        if (m >= 120) return 'B'; if (m >= 90) return 'C'; if (m >= 66) return 'D'; return 'E';
    }

    function generatePrint() {
        const cls = document.getElementById('printClass').value;
        let h = '';
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] && r[3].toString().trim() === cls) {
                let rows = '', gt = 0;
                
                Object.keys(colMap).forEach(s => {
                    const c = colMap[s];
                    const t = (parseInt(r[c[0]])||0)+(parseInt(r[c[1]])||0)+(parseInt(r[c[2]])||0)+(parseInt(r[c[3]])||0);
                    
                    let sName = s.toUpperCase();
                    if(s==='social') sName = "SOCIAL SCIENCE";
                    if(s==='physical') sName = "PHY. HEALTH EDU.";

                    if(s === 'physical') {
                        // Physical Education: No Marks, Only Half Yearly & Annual Grades
                        let g1 = getGrade((parseInt(r[c[1]])||0)*2); // Estimating grade
                        let g2 = getGrade((parseInt(r[c[3]])||0)*2);
                        rows += `<tr class="row-phy"><td>${sName}</td><td>-</td><td>${g1}</td><td>-</td><td>${g2}</td><td style="background:#eee!important">-</td><td style="color:blue">A</td></tr>`;
                    } else {
                        gt += t;
                        rows += `<tr class="row-${s}"><td>${sName}</td><td>${r[c[0]]||0}</td><td>${r[c[1]]||0}</td><td>${r[c[2]]||0}</td><td>${r[c[3]]||0}</td><td style="background:#fff9c4!important">${t}</td><td>${getGrade(t)}</td></tr>`;
                    }
                });

                const perc = (gt / 14).toFixed(2);
                const result = perc >= 33 ? "PASS" : "FAIL";

                h += `
                <div class="marksheet-page">
                    <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" class="watermark-logo">
                    <div class="m-content">
                        <div class="m-header">
                            <div style="display:flex; align-items:center; justify-content:center; gap:20px;">
                                <img src="2a7ade29-d3df-49ea-8b1d-63b8da857420.jpg" style="width:90px; border-radius:50%;">
                                <div>
                                    <h1 class="m-school-name">K.R.R. JUNIOR HIGH SCHOOL</h1>
                                    <p style="margin:5px; font-weight:bold; font-size:18px;">MANPUR BAHERI, BAREILLY (U.P.) 243201</p>
                                    <p style="color:var(--blue); font-weight:bold; margin:0;">SESSION : 2025 - 2026</p>
                                </div>
                            </div>
                        </div>

                        <div class="m-banner">PROGRESS REPORT</div>

                        <table class="m-info-table">
                            <tr>
                                <td width="60%">Student's Name : <span class="m-underline">${r[0]}</span></td>
                                <td width="40%">Roll No : <span class="m-underline">${r[4]}</span></td>
                            </tr>
                            <tr>
                                <td>Father's Name : <span class="m-underline">Mr. ${r[2]}</span></td>
                                <td>Class : <span class="m-underline">${r[3]}</span></td>
                            </tr>
                            <tr>
                                <td>Mother's Name : <span class="m-underline">Mrs. ${r[1]}</span></td>
                                <td>Date of Birth : <span class="m-underline">${r[5]||'---'}</span></td>
                            </tr>
                        </table>

                        <table class="m-marks-table">
                            <thead>
                                <tr>
                                    <th rowspan="2" width="200">SUBJECTS</th>
                                    <th>FA I+II</th><th>HALF YEARLY</th><th>FA III+IV</th><th>ANNUAL</th>
                                    <th style="background:#fff9c4!important; color:#000">TOTAL</th><th width="60">GRADE</th>
                                </tr>
                                <tr><th>30</th><th>70</th><th>30</th><th>70</th><th>200</th><th>-</th></tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>

                        <div class="m-result-box">
                            <span style="color:${result==='FAIL'?'red':'green'}">RESULT: ${result}</span>
                            <span>GRAND TOTAL: ${gt} / 1400</span>
                            <span>PERCENTAGE: ${perc}%</span>
                        </div>

                        <div style="margin-top:20px; font-weight:bold; font-size:18px; color:green;">
                            Remarks: ${perc > 80 ? 'Excellent Performance!' : 'Good, Keep it up!'}
                            <br><span style="color:#000; font-size:16px;">Promoted to Class: </span> 
                            <span style="color:var(--red); text-decoration:underline;">${result==='PASS'?'IX':r[3]}</span>
                        </div>

                        <div class="m-sig-row">
                            <div class="m-sig-box">Guardian's Sign</div>
                            <div class="m-sig-box">Class Teacher</div>
                            <div class="m-sig-box">Principal</div>
                        </div>
                    </div>
                </div>`;
            }
        });

        const w = window.open('', '_blank');
        w.document.write(`<html><head><style>${document.head.innerHTML}</style></head><body>${h}</body></html>`);
        w.document.close();
        setTimeout(() => w.print(), 1000);
    }
</script>
</body>
</html>
